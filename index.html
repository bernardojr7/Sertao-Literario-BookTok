<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sertão Literário</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-storage-compat.js"></script>

  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --text: #172033;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #f59e0b;
      --primary-dark: #d97706;
      --green: #22c55e;
      --green-dark: #15803d;
      --cyan: #06b6d4;
      --pink: #ec4899;
      --danger: #ef4444;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    body.dark {
      --bg: #0f172a;
      --surface: #172033;
      --surface2: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #334155;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 0%, rgba(245, 158, 11, 0.10), transparent 25%), var(--bg);
      color: var(--text);
      transition: background .25s, color .25s;
    }

    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    .hidden { display: none !important; }

    .toast {
      position: fixed; right: 22px; top: 22px; z-index: 50;
      max-width: 380px; padding: 16px 20px; border-radius: 14px;
      color: white; background: #172033; box-shadow: var(--shadow);
      transform: translateY(-12px); opacity: 0; transition: .25s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--green-dark); }
    .toast.error { background: #b91c1c; }

    .auth-layout { min-height: 100vh; display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(380px, 0.9fr); }

    .auth-hero {
      position: relative; overflow: hidden; padding: 70px clamp(30px, 7vw, 110px);
      color: white;
      background: linear-gradient(135deg, rgba(15,23,42,0.88), rgba(21,128,61,0.70)),
                  url('https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=1600&q=85') center/cover;
    }
    .auth-hero::after {
      content: '🌵'; position: absolute; right: 7%; bottom: -30px;
      font-size: 180px; opacity: 0.20; transform: rotate(-8deg);
    }
    .auth-hero-content { position: relative; z-index: 1; max-width: 620px; margin-top: 18vh; }
    .auth-hero-content h1 { font-family: 'Baloo 2', cursive; font-size: clamp(50px, 6vw, 80px); line-height: 0.95; margin: 20px 0; }
    .auth-hero-content p { max-width: 560px; color: rgba(255,255,255,0.85); font-size: 18px; line-height: 1.7; }

    .auth-panel { display: grid; place-items: center; padding: 30px; background: var(--surface); }
    .auth-card { width: min(100%, 470px); padding: 40px; border: 1px solid var(--border); border-radius: 28px; background: var(--surface); box-shadow: var(--shadow); }
    .auth-card h2 { font-family: 'Baloo 2', cursive; font-size: 32px; margin-bottom: 8px; }
    .auth-card > p { color: var(--muted); margin-bottom: 28px; }

    .auth-tabs {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 5px; margin-bottom: 24px;
      border-radius: 14px; background: var(--surface2);
    }
    .auth-tabs button { padding: 12px; border-radius: 10px; color: var(--muted); background: transparent; font-weight: 600; }
    .auth-tabs button.active { color: var(--text); background: var(--surface); box-shadow: 0 4px 14px rgba(15,23,42,0.08); }

    .form-grid { display: grid; gap: 16px; }
    label { display: grid; gap: 7px; color: var(--muted); font-size: 13px; font-weight: 600; }
    input, select, textarea {
      width: 100%; padding: 14px 15px; border: 1px solid var(--border); border-radius: 13px;
      outline: none; color: var(--text); background: var(--surface2); transition: border .2s;
    }
    textarea { min-height: 110px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(245,158,11,0.14); }

    .primary-btn, .secondary-btn, .danger-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 46px; padding: 12px 18px; border-radius: 13px; font-weight: 700; transition: .2s;
    }
    .primary-btn { color: white; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
    .secondary-btn { color: var(--text); border: 1px solid var(--border); background: var(--surface); }
    .danger-btn { color: white; background: var(--danger); }
    .primary-btn:hover, .secondary-btn:hover, .danger-btn:hover { transform: translateY(-2px); }
    .full { width: 100%; }

    .app-shell { min-height: 100vh; padding-bottom: 92px; }

    .topbar {
      position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between;
      gap: 18px; padding: 18px clamp(18px, 5vw, 70px);
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 86%, transparent); backdrop-filter: blur(16px);
    }
    .brand { display: flex; align-items: center; gap: 10px; font-family: 'Baloo 2', cursive; font-size: 24px; font-weight: 800; }
    .brand-mark { width: 44px; height: 44px; display: grid; place-items: center; border-radius: 14px; background: linear-gradient(135deg, var(--primary), var(--green)); font-size: 24px; }
    .top-actions { display: flex; align-items: center; gap: 10px; }
    .icon-btn { width: 42px; height: 42px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: 12px; color: var(--text); background: var(--surface); }
    .user-pill { display: flex; align-items: center; gap: 10px; padding: 5px 14px 5px 5px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); }
    .avatar { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 50%; background: linear-gradient(135deg, var(--green), var(--cyan)); color: white; font-weight: 800; font-size: 14px; }

    .page { width: min(1400px, 100%); margin: 0 auto; padding: 34px clamp(18px, 5vw, 70px); }
    .page-title { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 28px; }
    .page-title h1 { font-family: 'Baloo 2', cursive; font-size: clamp(36px, 5vw, 52px); line-height: 1; }
    .page-title p { margin-top: 7px; color: var(--muted); }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .stat-card {
      position: relative; overflow: hidden; padding: 22px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow);
    }
    .stat-card::after { content: ''; position: absolute; right: -20px; bottom: -30px; width: 100px; height: 100px; border-radius: 50%; background: rgba(245,158,11,0.10); }
    .stat-label { color: var(--muted); font-size: 13px; font-weight: 600; }
    .stat-value { font-family: 'Baloo 2', cursive; font-size: 34px; line-height: 1; margin-top: 7px; }
    .stat-icon { margin-bottom: 8px; font-size: 26px; }

    .panel { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); padding: 24px; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
    .panel-header h2 { font-family: 'Baloo 2', cursive; font-size: 24px; }
    .content-grid { display: grid; grid-template-columns: 1.35fr 0.65fr; gap: 18px; margin-top: 18px; }

    .progress-list { display: grid; gap: 18px; }
    .progress-info { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 13px; }
    .progress { height: 10px; border-radius: 99px; background: var(--surface2); overflow: hidden; }
    .progress > div { height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--primary), var(--green)); }

    .ranking { display: grid; gap: 10px; }
    .ranking-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 14px; background: var(--surface2); }
    .ranking-pos { width: 26px; color: var(--primary-dark); font-weight: 800; text-align: center; }
    .ranking-name { flex: 1; font-weight: 600; }
    .xp-badge { padding: 5px 9px; border-radius: 8px; color: var(--green-dark); background: rgba(34,197,94,0.13); font-size: 12px; font-weight: 700; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 18px; }
    .book-card, .post-card { overflow: hidden; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); }
    .book-cover { height: 170px; display: grid; place-items: center; background: linear-gradient(135deg, #f59e0b, #15803d); color: white; font-family: 'Baloo 2', cursive; font-size: 24px; }
    .book-content, .post-content { padding: 18px; }
    .book-content h3 { margin-bottom: 5px; }
    .book-content p { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .book-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }

    .tag { display: inline-flex; padding: 6px 10px; border-radius: 999px; color: var(--green-dark); background: rgba(34,197,94,0.13); font-size: 11px; font-weight: 700; }

    .post-video { height: 220px; display: grid; place-items: center; background: linear-gradient(135deg, #06b6d4, #ec4899); color: white; font-size: 48px; }
    .post-actions { display: flex; gap: 12px; margin-top: 14px; }
    .post-actions button { padding: 6px 10px; border-radius: 9px; color: var(--muted); background: var(--surface2); }

    .empty-state { padding: 50px 20px; color: var(--muted); text-align: center; }

    .modal {
      position: fixed; inset: 0; z-index: 40; display: grid; place-items: center; padding: 20px;
      background: rgba(15,23,42,0.55); backdrop-filter: blur(5px);
    }
    .modal-card { width: min(100%, 560px); max-height: calc(100vh - 40px); overflow-y: auto; padding: 28px; border: 1px solid var(--border); border-radius: 24px; background: var(--surface); box-shadow: var(--shadow); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-header h2 { font-family: 'Baloo 2', cursive; font-size: 28px; }

    .bottom-nav {
      position: fixed; left: 50%; bottom: 16px; z-index: 20;
      width: min(720px, calc(100% - 28px));
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 7px;
      border: 1px solid var(--border); border-radius: 22px;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      box-shadow: var(--shadow); backdrop-filter: blur(16px);
      transform: translateX(-50%);
    }
    .nav-btn { display: grid; justify-items: center; gap: 3px; padding: 9px 4px; border-radius: 14px; color: var(--muted); background: transparent; font-size: 11px; font-weight: 600; }
    .nav-btn span:first-child { font-size: 20px; }
    .nav-btn.active { color: var(--primary-dark); background: rgba(245,158,11,0.12); }

    .section-space { margin-top: 28px; }
    .muted { color: var(--muted); }
    .flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 12px; }

    @media (max-width: 1050px) {
      .auth-layout { grid-template-columns: 1fr; }
      .auth-hero { min-height: 400px; }
      .auth-hero-content { margin-top: 60px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .content-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .auth-hero { min-height: 370px; padding: 32px 22px; }
      .auth-hero-content h1 { font-size: 48px; }
      .auth-panel { padding: 18px; }
      .auth-card { padding: 24px; }
      .topbar { padding: 14px 18px; }
      .page { padding: 25px 16px 100px; }
      .page-title { flex-direction: column; align-items: flex-start; }
      .stats-grid, .cards-grid { grid-template-columns: 1fr; }
      .bottom-nav { bottom: 10px; }
    }
  </style>
</head>
<body>

  <div id="app"></div>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modalTitle">Título</h2>
        <button id="closeModalBtn" class="icon-btn">×</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA-xVOI6qXkEndKXkSp6-zRLY01qNkQH4E",
      authDomain: "sertao-literario-booktok.firebaseapp.com",
      projectId: "sertao-literario-booktok",
      storageBucket: "sertao-literario-booktok.firebasestorage.app",
      messagingSenderId: "291651799720",
      appId: "1:291651799720:web:b5c79954511f09b8ddd09d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    const PROFESSOR_CODE = "SERTAO-PROF-2026";
    const COORDINATOR_CODE = "SERTAO-COORD-2026";

    let currentUser = null;
    let currentProfile = null;
    let currentPage = "home";
    let currentTheme = localStorage.getItem("st-theme") || "light";

    document.body.classList.toggle("dark", currentTheme === "dark");

    function $(s) { return document.querySelector(s); }
    function $$(s) { return document.querySelectorAll(s); }

    function toast(msg, type) {
      type = type || "";
      var t = $("#toast");
      t.textContent = msg;
      t.className = "toast show " + type;
      setTimeout(function() { t.className = "toast"; }, 3500);
    }

    function initials(name) {
      return (name || "SL").split(" ").slice(0, 2).map(function(w) { return w[0]; }).join("").toUpperCase();
    }

    function roleLabel(r) {
      var map = { student: "Aluno", teacher: "Professor", coordinator: "Coordenador" };
      return map[r] || "Usuário";
    }

    function openModal(title, body) {
      $("#modalTitle").textContent = title;
      $("#modalBody").innerHTML = body;
      $("#modal").classList.remove("hidden");
    }

    function closeModal() {
      $("#modal").classList.add("hidden");
    }

    function pageTitle(title, desc, extra) {
      extra = extra || "";
      return '<div class="page-title"><div><h1>' + title + '</h1><p>' + desc + '</p></div>' + extra + '</div>';
    }

    function statCard(icon, label, value) {
      return '<div class="stat-card"><div class="stat-icon">' + icon + '</div><div class="stat-label">' + label + '</div><div class="stat-value">' + value + '</div></div>';
    }

    function renderApp() {
      var p = currentProfile;
      var icons = ["🏠","📚","🛍️","🎬","👤"];
      var labels = ["Home","Biblioteca","Loja","BookTok","Perfil"];
      var pages = ["home","library","store","booktok","profile"];

      var navHtml = "";
      for (var i = 0; i &lt; pages.length; i++) {
        navHtml += '<button class="nav-btn' + (pages[i] === currentPage ? ' active' : '') + '" data-page="' + pages[i] + '"><span>' + icons[i] + '</span><span>' + labels[i] + '</span></button>';
      }

      document.getElementById("app").innerHTML =
        '<div class="app-shell">' +
          '<header class="topbar">' +
            '<div class="brand"><div class="brand-mark">🌵</div><span>Sertão Literário</span></div>' +
            '<div class="top-actions">' +
              '<button id="themeBtn" class="icon-btn">' + (currentTheme === "dark" ? "☀" : "☾") + '</button>' +
              '<div class="user-pill"><div class="avatar">' + initials(p.name) + '</div><span>' + (p.name ? p.name.split(" ")[0] : "") + '</span></div>' +
              '<button id="logoutBtn" class="secondary-btn">Sair</button>' +
            '</div>' +
          '</header>' +
          '<main id="pageContent" class="page"></main>' +
          '<nav class="bottom-nav">' + navHtml + '</nav>' +
        '</div>';

      document.getElementById("themeBtn").onclick = function() {
        currentTheme = currentTheme === "dark" ? "light" : "dark";
        document.body.classList.toggle("dark", currentTheme === "dark");
        localStorage.setItem("st-theme", currentTheme);
        renderApp();
      };

      document.getElementById("logoutBtn").onclick = function() { auth.signOut(); };

      var navBtns = $$(".nav-btn");
      for (var i = 0; i &lt; navBtns.length; i++) {
        navBtns[i].onclick = function() {
          currentPage = this.dataset.page;
          renderApp();
        };
      }

      loadPage();
    }

    function loadPage() {
      var pages = {
        home: renderHome,
        library: renderLibrary,
        store: renderStore,
        booktok: renderBookTok,
        profile: renderProfile
      };
      pages[currentPage]();
    }

    async function renderHome() {
      var p = currentProfile;
      var isStu = p.role === "student";

      var rankingHtml = '<div class="empty-state">Aguardando dados</div>';

      if (isStu) {
        try {
          var q = db.collection("users").where("className", "==", p.className).where("role", "==", "student").orderBy("xp", "desc").limit(5);
          var snap = await q.get();
          if (!snap.empty) {
            var users = [];
            snap.forEach(function(d) { users.push({ id: d.id, ...d.data() }); });
            rankingHtml = users.map(function(u, i) {
              return '<div class="ranking-item"><div class="ranking-pos">' + (i+1) + '</div><div class="avatar" style="width:30px;height:30px;font-size:13px">' + initials(u.name) + '</div><div class="ranking-name">' + u.name + '</div><span class="xp-badge">' + (u.xp||0) + ' XP</span></div>';
            }).join("");
          }
        } catch(e) { console.error(e); }
      }

      var booksRead = p.booksRead || 0;
      var xp = p.xp || 0;
      var coins = p.cactoscoins || 0;
      var level = p.level || 1;

      $("#pageContent").innerHTML =
        pageTitle("Olá, " + ((p.name||"").split(" ")[0]||"Leitor") + "!", isStu ? "Turma " + p.className : "Painel • " + roleLabel(p.role)) +
        '<div class="stats-grid">' +
          (isStu ? statCard("🌵","Cactoscoins",coins) : statCard("👥","Turmas",p.role==="coordinator"?"Todas":"3")) +
          (isStu ? statCard("⭐","XP",xp) : statCard("📖","Leituras pendentes","0")) +
          (isStu ? statCard("🏅","Nível",level) : statCard("🎯","Missões ativas","0")) +
          (isStu ? statCard("📚","Livros lidos",booksRead) : statCard("📈","Engajamento","0%")) +
        '</div>' +
        '<div class="content-grid">' +
          '<section class="panel"><div class="panel-header"><h2>Metas de leitura</h2></div>' +
            '<div class="progress-list">' +
              '<div><div class="progress-info"><span>Meta bimestral</span><strong>' + booksRead + ' de 10</strong></div><div class="progress"><div style="width:' + Math.min(booksRead/10*100,100) + '%"></div></div></div>' +
              '<div><div class="progress-info"><span>Meta semestral</span><strong>' + booksRead + ' de 30</strong></div><div class="progress"><div style="width:' + Math.min(booksRead/30*100,100) + '%"></div></div></div>' +
              '<div><div class="progress-info"><span>Meta anual</span><strong>' + booksRead + ' de 60</strong></div><div class="progress"><div style="width:' + Math.min(booksRead/60*100,100) + '%"></div></div></div>' +
            '</div></section>' +
          '<section class="panel"><div class="panel-header"><h2>Ranking</h2><span class="tag">Top 5</span></div><div class="ranking">' + rankingHtml + '</div></section>' +
        '</div>' +
        '<section class="panel section-space"><div class="panel-header"><h2>Missões da turma</h2>' + (isStu ? "" : '<button class="primary-btn" id="newMissionBtn">Criar desafio</button>') + '</div><div id="missionsContainer"><div class="empty-state">Nenhuma missão ativa.</div></div></section>';

      var newBtn = document.getElementById("newMissionBtn");
      if (newBtn) newBtn.onclick = showMissionModal;
      loadMissions();
    }

    async function loadMissions() {
      try {
        var q = db.collection("missions").where("isActive","==",true).orderBy("createdAt","desc").limit(20);
        var snap = await q.get();
        var el = $("#missionsContainer");
        if (snap.empty) { el.innerHTML = '<div class="empty-state">Nenhuma missão ativa.</div>'; return; }
        var html = "";
        snap.forEach(function(d) {
          var m = d.data();
          html += '<div class="panel" style="padding:18px;margin-bottom:10px">' +
            '<div class="flex-between"><strong>' + m.title + '</strong><span class="reward" style="color:var(--primary-dark);font-weight:800">+' + (m.coins||0) + ' 🌵</span></div>' +
            '<p class="muted" style="margin-top:6px">' + (m.description||"") + '</p>';
          if (currentProfile.role === "student") {
            html += '<button class="primary-btn" style="margin-top:10px;padding:8px 12px;min-height:auto;font-size:13px" data-mission="' + d.id + '">Concluir missão</button>';
          }
          html += '</div>';
        });
        el.innerHTML = html;
        var btns = document.querySelectorAll("[data-mission]");
        for (var i = 0; i &lt; btns.length; i++) {
          btns[i].onclick = function() { toast("Missão enviada para validação!", "success"); };
        }
      } catch(e) { console.error(e); }
    }

    function showMissionModal() {
      openModal("Criar desafio",
        '<form id="missionForm" class="form-grid">' +
          '<label>Título <input name="title" required /></label>' +
          '<label>Descrição <textarea name="description" required></textarea></label>' +
          '<label>Recompensa (Cactoscoins) <input name="coins" type="number" min="1" value="50" /></label>' +
          '<button class="primary-btn full" type="submit">Publicar desafio</button>' +
        '</form>');
      document.getElementById("missionForm").onsubmit = async function(e) {
        e.preventDefault();
        var fd = new FormData(e.target);
        await db.collection("missions").add({
          title: fd.get("title"),
          description: fd.get("description"),
          coins: Number(fd.get("coins")),
          className: currentProfile.className,
          isActive: true,
          createdBy: currentUser.uid,
          createdAt: new Date().toISOString()
        });
        closeModal();
        toast("Desafio publicado!", "success");
        renderHome();
      };
    }

    async function renderLibrary() {
      var books = [];
      try {
        var q = db.collection("books").where("isActive","==",true).orderBy("title");
        var snap = await q.get();
        snap.forEach(function(d) { books.push({ id: d.id, ...d.data() }); });
      } catch(e) { console.error(e); }

      var isStaff = currentProfile.role !== "student";

      var booksHtml = books.length ? "" : '<div class="empty-state">Nenhum livro cadastrado.</div>';
      for (var i = 0; i &lt; books.length; i++) {
        var b = books[i];
        booksHtml +=
          '<article class="book-card">' +
            '<div class="book-cover">📚</div>' +
            '<div class="book-content">' +
              '<span class="tag">' + (b.category||"Literatura") + '</span>' +
              '<h3>' + b.title + '</h3>' +
              '<p>' + (b.author||"") + ' • ' + (b.pages||0) + 'p</p>' +
              '<div class="book-meta">' +
                (b.pdfUrl ? '<a class="secondary-btn" href="' + b.pdfUrl + '" target="_blank" style="font-size:12px">📄 PDF</a>' : '<span class="muted" style="font-size:12px">Sem PDF</span>');
        if (isStaff) {
          booksHtml += '<button class="danger-btn" style="font-size:12px;padding:6px 10px;min-height:auto" data-del="' + b.id + '">Excluir</button>';
        } else if (currentProfile.role === "student") {
          booksHtml += '<button class="primary-btn" style="font-size:12px;padding:6px 10px;min-height:auto" data-read="' + b.title.replace(/"/g,"&quot;") + '">Ler</button>';
        }
        booksHtml += '</div></div></article>';
      }

      $("#pageContent").innerHTML =
        pageTitle("Biblioteca", isStaff ? "Gerencie os livros." : "Descubra leituras.", isStaff ? '<button class="primary-btn" id="addBookBtn">+ Livro</button>' : "") +
        '<div class="panel">' +
          '<div class="flex" style="margin-bottom:18px"><input id="searchInput" placeholder="Buscar..." style="flex:1" /></div>' +
          '<div id="booksGrid" class="cards-grid">' + booksHtml + '</div>' +
        '</div>';

      document.getElementById("searchInput").oninput = function(e) {
        var t = e.target.value.toLowerCase();
        var cards = $$(".book-card");
        for (var i = 0; i &lt; cards.length; i++) {
          cards[i].style.display = cards[i].textContent.toLowerCase().indexOf(t) >= 0 ? "" : "none";
        }
      };

      var addBtn = document.getElementById("addBookBtn");
      if (addBtn) {
        addBtn.onclick = function() {
          openModal("Adicionar livro",
            '<form id="bookForm" class="form-grid">' +
              '<label>Título <input name="title" required /></label>' +
              '<label>Autor <input name="author" required /></label>' +
              '<label>Páginas <input name="pages" type="number" min="1" /></label>' +
              '<label>Categoria <input name="category" value="Literatura" /></label>' +
              '<label>Link do PDF <input name="pdfUrl" type="url" /></label>' +
              '<button class="primary-btn full" type="submit">Salvar</button>' +
            '</form>');
          document.getElementById("bookForm").onsubmit = async function(e) {
            e.preventDefault();
            var fd = new FormData(e.target);
            await db.collection("books").add({
              title: fd.get("title"), author: fd.get("author"),
              pages: Number(fd.get("pages")), category: fd.get("category"),
              pdfUrl: fd.get("pdfUrl"), isActive: true,
              createdAt: new Date().toISOString()
            });
            closeModal();
            toast("Livro adicionado!", "success");
            renderLibrary();
          };
        };
      }

      var delBtns = document.querySelectorAll("[data-del]");
      for (var i = 0; i &lt; delBtns.length; i++) {
        delBtns[i].onclick = async function() {
          if (confirm("Excluir este livro?")) {
            await db.collection("books").doc(this.dataset.del).delete();
            toast("Livro removido.");
            renderLibrary();
          }
        };
      }

      var readBtns = document.querySelectorAll("[data-read]");
      for (var i = 0; i &lt; readBtns.length; i++) {
        readBtns[i].onclick = function() {
          var title = this.dataset.read;
          openModal("Registrar leitura",
            '<form id="readForm" class="form-grid">' +
              '<label>Livro <input name="bookTitle" value="' + title.replace(/"/g,"&quot;") + '" readonly /></label>' +
              '<label>Páginas lidas <input name="pages" type="number" min="1" required /></label>' +
              '<label>Data <input name="date" type="date" required /></label>' +
              '<button class="primary-btn full" type="submit">Enviar para aprovação</button>' +
            '</form>');
          document.getElementById("readForm").onsubmit = async function(e) {
            e.preventDefault();
            var fd = new FormData(e.target);
            await db.collection("readings").add({
              userId: currentUser.uid, userName: currentProfile.name,
              className: currentProfile.className,
              bookTitle: fd.get("bookTitle"), pagesRead: Number(fd.get("pages")),
              readingDate: fd.get("date"), status: "pending",
              createdAt: new Date().toISOString()
            });
            closeModal();
            toast("Leitura enviada para aprovação!", "success");
          };
        };
      }
    }

    async function renderStore() {
      var items = [];
      try {
        var snap = await db.collection("storeItems").where("isActive","==",true).get();
        snap.forEach(function(d) { items.push({ id: d.id, ...d.data() }); });
      } catch(e) { console.error(e); }

      var isStu = currentProfile.role === "student";
      var coins = currentProfile.cactoscoins || 0;

      var itemsHtml = items.length ? "" : '<div class="empty-state">Nenhum item disponível.</div>';
      for (var i = 0; i &lt; items.length; i++) {
        var it = items[i];
        itemsHtml +=
          '<article class="book-card">' +
            '<div class="book-cover">' + (it.icon||"🎨") + '</div>' +
            '<div class="book-content">' +
              '<h3>' + it.title + '</h3>' +
              '<p>' + (it.description||"") + '</p>' +
              '<div class="book-meta">' +
                '<strong>🌵 ' + (it.priceCoins||0) + ' • ⭐ ' + (it.requiredXp||0) + '</strong>' +
                (isStu ? '<button class="primary-btn" data-idx="' + i + '">Comprar</button>' : '') +
              '</div></div></article>';
      }

      $("#pageContent").innerHTML =
        pageTitle("Loja Literária", isStu ? coins + " Cactoscoins disponíveis" : "Itens para os alunos.") +
        '<div class="stats-grid" style="margin-bottom:18px">' +
          statCard("🌵","Saldo",coins) + statCard("⭐","XP",currentProfile.xp||0) + '</div>' +
        '<div class="cards-grid">' + itemsHtml + '</div>';

      if (isStu) {
        var buyBtns = document.querySelectorAll("[data-idx]");
        for (var i = 0; i &lt; buyBtns.length; i++) {
          buyBtns[i].onclick = (function(idx) {
            return async function() {
              var item = items[idx];
              if (coins &lt; item.priceCoins) return toast("Cactoscoins insuficientes.", "error");
              if ((currentProfile.xp||0) &lt; item.requiredXp) return toast("XP insuficiente.", "error");
              try {
                await db.runTransaction(async function(tx) {
                  var ref = db.collection("users").doc(currentUser.uid);
                  var snap = await tx.get(ref);
                  var u = snap.data();
                  if ((u.cactoscoins||0) &lt; item.priceCoins) throw new Error("Saldo");
                  tx.update(ref, { cactoscoins: (u.cactoscoins||0) - item.priceCoins });
                  tx.set(db.collection("purchases").doc(), {
                    userId: currentUser.uid, itemId: item.id,
                    price: item.priceCoins, createdAt: new Date().toISOString()
                  });
                });
                toast("Item adquirido!", "success");
                setTimeout(function() { renderStore(); }, 500);
              } catch(e) { toast("Erro na compra.", "error"); }
            };
          })(i);
        }
      }
    }

    async function renderBookTok() {
      var posts = [];
      try {
        var q = currentProfile.role === "coordinator"
          ? db.collection("posts").where("status","==","active").orderBy("createdAt","desc")
          : db.collection("posts").where("className","==",currentProfile.className).where("status","==","active").orderBy("createdAt","desc");
        var snap = await q.get();
        snap.forEach(function(d) { posts.push({ id: d.id, ...d.data() }); });
      } catch(e) { console.error(e); }

      var postsHtml = posts.length ? "" : '<div class="empty-state">Nenhuma publicação ainda.</div>';
      for (var i = 0; i &lt; posts.length; i++) {
        var p = posts[i];
        postsHtml +=
          '<article class="post-card">' +
            '<div class="post-video">' + (p.videoUrl ? "▶" : "📖") + '</div>' +
            '<div class="post-content">' +
              '<span class="tag">@' + ((p.userName||"").toLowerCase().replace(/\s/g,"")) + '</span>' +
              '<h3>' + p.title + '</h3>' +
              '<p>' + (p.description||"") + '</p>' +
              '<div class="post-actions">' +
                '<button class="like-btn" data-id="' + p.id + '">❤️ ' + (p.likesCount||0) + '</button>' +
                '<button>💬 ' + (p.commentsCount||0) + '</button>' +
              '</div></div></article>';
      }

      $("#pageContent").innerHTML =
        pageTitle("BookTok", "Compartilhe resenhas.", '<button class="primary-btn" id="newPostBtn">Nova resenha</button>') +
        '<div class="cards-grid">' + postsHtml + '</div>';

      document.getElementById("newPostBtn").onclick = function() {
        openModal("Nova resenha",
          '<form id="postForm" class="form-grid">' +
            '<label>Título <input name="title" required /></label>' +
            '<label>Descrição <textarea name="description" required></textarea></label>' +
            '<label>Link do vídeo <input name="videoUrl" type="url" /></label>' +
            '<button class="primary-btn full" type="submit">Publicar</button>' +
          '</form>');
        document.getElementById("postForm").onsubmit = async function(e) {
          e.preventDefault();
          var fd = new FormData(e.target);
          await db.collection("posts").add({
            title: fd.get("title"), description: fd.get("description"),
            videoUrl: fd.get("videoUrl"), userId: currentUser.uid,
            userName: currentProfile.name, className: currentProfile.className,
            likesCount: 0, commentsCount: 0, status: "active",
            createdAt: new Date().toISOString()
          });
          closeModal();
          toast("Resenha publicada!", "success");
          renderBookTok();
        };
      };

      var likeBtns = document.querySelectorAll(".like-btn");
      for (var i = 0; i &lt; likeBtns.length; i++) {
        likeBtns[i].onclick = async function() {
          await db.collection("posts").doc(this.dataset.id).update({
            likesCount: firebase.firestore.FieldValue.increment(1)
          });
          toast("Curtiu!");
          renderBookTok();
        };
      }
    }

    function renderProfile() {
      var p = currentProfile;
      $("#pageContent").innerHTML =
        pageTitle("Meu perfil", "Gerencie suas informações.", '<span class="tag" style="font-size:14px">' + roleLabel(p.role) + '</span>') +
        '<div class="content-grid">' +
          '<div class="panel">' +
            '<h2 style="margin-bottom:20px">Informações</h2>' +
            '<div class="form-grid">' +
              '<label>Nome <input id="editName" value="' + (p.name||"").replace(/"/g,"&quot;") + '" /></label>' +
              '<label>E-mail <input value="' + (p.email||"").replace(/"/g,"&quot;") + '" disabled /></label>' +
              '<label>Turma <input value="' + (p.className||"").replace(/"/g,"&quot;") + '" disabled /></label>' +
              '<button id="saveBtn" class="primary-btn full">Salvar alterações</button>' +
              '<button id="pwdBtn" class="secondary-btn full">Alterar senha</button>' +
              '<button id="delBtn" class="danger-btn full">Apagar conta</button>' +
            '</div></div>' +
          '<div class="panel">' +
            '<h2 style="margin-bottom:20px">Histórico</h2>' +
            '<div class="progress-list">' +
              '<div class="ranking-item"><span>📚</span><span class="ranking-name">Livros lidos</span><strong>' + (p.booksRead||0) + '</strong></div>' +
              '<div class="ranking-item"><span>⭐</span><span class="ranking-name">XP</span><strong>' + (p.xp||0) + '</strong></div>' +
              '<div class="ranking-item"><span>🏅</span><span class="ranking-name">Nível</span><strong>' + (p.level||1) + '</strong></div>' +
              '<div class="ranking-item"><span>🌵</span><span class="ranking-name">Cactoscoins</span><strong>' + (p.cactoscoins||0) + '</strong></div>' +
            '</div></div></div>';

      document.getElementById("saveBtn").onclick = async function() {
        var name = document.getElementById("editName").value.trim();
        if (!name) return toast("Informe seu nome.", "error");
        await db.collection("users").doc(currentUser.uid).update({ name: name });
        currentProfile.name = name;
        toast("Perfil atualizado!", "success");
      };

      document.getElementById("pwdBtn").onclick = async function() {
        var current = prompt("Senha atual:");
        if (!current) return;
        var newPwd = prompt("Nova senha (6+):");
        if (!newPwd || newPwd.length &lt; 6) return toast("Nova senha inválida.", "error");
        try {
          var cred = firebase.auth.EmailAuthProvider.credential(auth.currentUser.email, current);
          await auth.currentUser.reauthenticateWithCredential(cred);
          await auth.currentUser.updatePassword(newPwd);
          toast("Senha alterada!", "success");
        } catch(e) { toast("Senha atual incorreta.", "error"); }
      };

      document.getElementById("delBtn").onclick = async function() {
        var c = prompt('Digite CONFIRMAR para excluir sua conta:');
        if (c !== "CONFIRMAR") return;
        var pwd = prompt("Sua senha atual:");
        if (!pwd) return;
        try {
          var cred = firebase.auth.EmailAuthProvider.credential(auth.currentUser.email, pwd);
          await auth.currentUser.reauthenticateWithCredential(cred);
          await db.collection("users").doc(currentUser.uid).delete();
          await auth.currentUser.delete();
          toast("Conta excluída.");
        } catch(e) { toast("Senha incorreta.", "error"); }
      };
    }

    // AUTH
    var isRegister = false;

    function renderAuth() {
      var saved = localStorage.getItem("st-theme");
      if (saved === "dark") document.body.classList.add("dark");

      document.getElementById("app").innerHTML =
        '<div class="auth-layout">' +
          '<div class="auth-hero">' +
            '<div class="brand"><div class="brand-mark">🌵</div><span>Sertão Literário</span></div>' +
            '<div class="auth-hero-content">' +
              '<h1>A leitura virou jornada.</h1>' +
              '<p>Uma experiência literária gamificada. Leia, conquiste, compartilhe.</p>' +
            '</div></div>' +
          '<div class="auth-panel">' +
            '<div class="auth-card">' +
              '<h2 id="authTitle">Entrar na jornada</h2>' +
              '<p id="authDesc">Acesse seu painel de leitura.</p>' +
              '<div class="auth-tabs">' +
                '<button id="tabLogin" class="active">Entrar</button>' +
                '<button id="tabReg">Criar conta</button>' +
              '</div>' +
              '<form id="authForm" class="form-grid">' +
                '<div id="nameField" class="hidden"><label>Nome <input id="inpName" type="text" /></label></div>' +
                '<label>E-mail <input id="inpEmail" type="email" required /></label>' +
                '<div id="roleField" class="hidden">' +
                  '<label>Perfil <select id="inpRole">' +
                    '<option value="student">Aluno</option>' +
                    '<option value="teacher">Professor</option>' +
                    '<option value="coordinator">Coordenador</option>' +
                  '</select></label></div>' +
                '<div id="codeField" class="hidden"><label>Código <input id="inpCode" type="password" /></label></div>' +
                '<label>Senha <input id="inpPwd" type="password" minlength="6" required /></label>' +
                '<button class="primary-btn full" type="submit" id="authBtn">Entrar</button>' +
              '</form></div></div></div>';

      document.getElementById("tabLogin").onclick = function() { setMode(false); };
      document.getElementById("tabReg").onclick = function() { setMode(true); };
      document.getElementById("inpRole").onchange = function() {
        document.getElementById("codeField").classList.toggle("hidden", this.value === "student");
      };
      document.getElementById("authForm").onsubmit = handleAuth;

      setMode(false);
    }

    function setMode(reg) {
      isRegister = reg;
      document.getElementById("tabLogin").classList.toggle("active", !reg);
      document.getElementById("tabReg").classList.toggle("active", reg);
      document.getElementById("nameField").classList.toggle("hidden", !reg);
      document.getElementById("roleField").classList.toggle("hidden", !reg);
      if (!reg) document.getElementById("codeField").classList.add("hidden");
      document.getElementById("authTitle").textContent = reg ? "Crie sua jornada" : "Entrar na jornada";
      document.getElementById("authDesc").textContent = reg ? "Escolha seu perfil." : "Acesse seu painel.";
      document.getElementById("authBtn").textContent = reg ? "Criar conta" : "Entrar";
    }

    async function handleAuth(e) {
      e.preventDefault();
      var email = document.getElementById("inpEmail").value.trim();
      var pwd = document.getElementById("inpPwd").value;

      if (!email || pwd.length &lt; 6) return toast("E-mail e senha (6+ caracteres) obrigatórios.", "error");

      try {
        if (isRegister) {
          var name = document.getElementById("inpName").value.trim();
          var role = document.getElementById("inpRole").value;
          var code = (document.getElementById("inpCode") ? document.getElementById("inpCode").value.trim() : "");

          if (!name) return toast("Informe seu nome.", "error");
          if (role === "teacher" && code !== PROFESSOR_CODE) return toast("Código de professor inválido.", "error");
          if (role === "coordinator" && code !== COORDINATOR_CODE) return toast("Código de coordenador inválido.", "error");

          var cred = await auth.createUserWithEmailAndPassword(email, pwd);
          await db.collection("users").doc(cred.user.uid).set({
            name: name, email: email, role: role,
            className: role === "coordinator" ? "Todas as turmas" : "6º Ano",
            xp: 0, cactoscoins: 0, level: 1, booksRead: 0, isActive: true,
            createdAt: new Date().toISOString()
          });
          toast("Conta criada!", "success");
        } else {
          await auth.signInWithEmailAndPassword(email, pwd);
        }
      } catch(err) {
        var msgs = {
          "auth/invalid-credential": "E-mail ou senha inválidos.",
          "auth/email-already-in-use": "E-mail já cadastrado.",
          "auth/too-many-requests": "Muitas tentativas. Aguarde."
        };
        toast(msgs[err.code] || "Erro ao acessar.", "error");
        console.error(err);
      }
    }

    // Bootstrap
    auth.onAuthStateChanged(function(user) {
      if (!user) {
        currentUser = null;
        currentProfile = null;
        renderAuth();
        return;
      }
      db.collection("users").doc(user.uid).get().then(function(snap) {
        if (snap.exists) {
          currentUser = user;
          currentProfile = Object.assign({ uid: user.uid }, snap.data());
          renderApp();
        } else {
          renderAuth();
        }
      }).catch(function(err) {
        console.error(err);
        renderAuth();
      });
    });

    document.getElementById("closeModalBtn").onclick = closeModal;
    document.getElementById("modal").onclick = function(e) {
      if (e.target === document.getElementById("modal")) closeModal();
    };

  </script>
</body>
</html>
